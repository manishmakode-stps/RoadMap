<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <div class="top">
            <form onsubmit='handleSearch(event)'>
                <input type="text" id="search" name="search" placeholder="enter city"> 
                <button type="submit" id="btn">search</button>
            </form>
        </div>
        <div class="display">
            <h1 class="temp"></h1>
            <p class="city"></p>
            <p class="humidity"></p>
            <p class="pressure"></p>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
